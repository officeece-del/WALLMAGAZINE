<!DOCTYPE html>
<html>
<head>

<title>Wall Magazine</title>

<style>

body{
font-family: Arial;
background:#d8c9a3;
text-align:center;
}

h1{
background:#5a3e1b;
color:white;
padding:15px;
margin:0;
}

.board{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:30px;
}

.card{
background:white;
width:220px;
margin:20px;
padding:10px;
border-radius:10px;
box-shadow:3px 3px 10px gray;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:5px;
}

.viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
text-align:center;
}

.viewer img{
max-width:90%;
max-height:90%;
margin-top:40px;
border:6px solid white;
}

.close{
color:white;
font-size:30px;
position:absolute;
top:20px;
right:40px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Department Digital Wall Magazine</h1>

<div class="board">

<div class="card" onclick="show('article1.jpg')">
<img src="article1.jpg">
<h3>Church Bells and Touchscreens</h3>
</div>

<div class="card" onclick="show('article2.jpg')">
<img src="article2.jpg">
<h3>Tribal Circuits of Jharkhand</h3>
</div>

<div class="card" onclick="show('article3.jpg')">
<img src="article3.jpg">
<h3>Folklore Gaming World</h3>
</div>

<div class="card" onclick="show('article4.jpg')">
<img src="article4.jpg">
<h3>Assam's Blend of Past and Future</h3>
</div>

</div>

<div class="viewer" id="viewer">

<span class="close" onclick="closeViewer()">X</span>

<img id="fullimg">

</div>

<script>

function show(img){

document.getElementById("viewer").style.display="block";

document.getElementById("fullimg").src=img;

}

function closeViewer(){

document.getElementById("viewer").style.display="none";

}

</script>

</body>
</html>
